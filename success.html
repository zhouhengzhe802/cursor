<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录成功</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, Arial, sans-serif;
      background: linear-gradient(145deg, #e8f8ef 0%, #d4f0e0 35%, #b8e8cc 70%, #a0dfc0 100%);
      overflow: hidden;
      position: relative;
    }

    /* 背景装饰气泡 */
    .bubble {
      position: absolute;
      border-radius: 50%;
      opacity: 0.35;
      animation: float 8s ease-in-out infinite;
    }
    .bubble:nth-child(1) { width: 280px; height: 280px; background: radial-gradient(circle, #7dd3a8, transparent 70%); top: -80px; left: -60px; animation-delay: 0s; }
    .bubble:nth-child(2) { width: 200px; height: 200px; background: radial-gradient(circle, #5ec98a, transparent 70%); bottom: -50px; right: -40px; animation-delay: -3s; }
    .bubble:nth-child(3) { width: 140px; height: 140px; background: radial-gradient(circle, #9ee4bc, transparent 70%); top: 40%; right: 8%; animation-delay: -5s; }
    .bubble:nth-child(4) { width: 100px; height: 100px; background: radial-gradient(circle, #6dd4a0, transparent 70%); bottom: 20%; left: 10%; animation-delay: -2s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-18px) scale(1.04); }
    }

    /* 主卡片 */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 52px 44px 44px;
      border-radius: 24px;
      box-shadow:
        0 20px 60px rgba(46, 125, 90, 0.18),
        0 4px 20px rgba(46, 125, 90, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.7);
      min-width: 340px;
      max-width: 420px;
      text-align: center;
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* 成功图标 */
    .icon-wrap {
      width: 88px;
      height: 88px;
      margin: 0 auto 28px;
      background: linear-gradient(145deg, #3dba7a, #2a9d62);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 28px rgba(42, 157, 98, 0.35);
      animation: iconPop 0.6s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes iconPop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .icon-wrap svg {
      width: 44px;
      height: 44px;
      stroke: #fff;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .check-path {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: drawCheck 0.5s 0.7s ease forwards;
    }

    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    /* 标题 */
    .title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1a5c3a;
      letter-spacing: 0.5px;
      line-height: 1.4;
      margin-bottom: 12px;
      animation: fadeUp 0.5s 0.5s ease both;
    }

    .subtitle {
      font-size: 1rem;
      color: #4a8c6a;
      font-weight: 400;
      letter-spacing: 0.3px;
      margin-bottom: 36px;
      animation: fadeUp 0.5s 0.65s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 分隔装饰线 */
    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #3dba7a, #7dd3a8);
      border-radius: 2px;
      margin: 0 auto 32px;
      animation: fadeUp 0.5s 0.75s ease both;
    }

    /* 返回按钮 */
    .btn-back {
      display: inline-block;
      padding: 13px 36px;
      background: linear-gradient(90deg, #2a9d62 0%, #3dba7a 60%, #52c98a 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(42, 157, 98, 0.3);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      animation: fadeUp 0.5s 0.85s ease both;
    }

    .btn-back:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(42, 157, 98, 0.4);
      background: linear-gradient(90deg, #248f58 0%, #35b070 60%, #48c080 100%);
    }

    .btn-back:active {
      transform: translateY(0);
      box-shadow: 0 3px 12px rgba(42, 157, 98, 0.25);
    }
  </style>
</head>
<body>

  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24">
        <polyline class="check-path" points="6 12 10 16 18 8"/>
      </svg>
    </div>

    <h1 class="title">登录成功！</h1>
    <p class="subtitle">欢迎来到新世界</p>

    <div class="divider"></div>

    <a href="index.html" class="btn-back">返回登录</a>
  </div>

</body>
</html>
